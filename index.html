<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Password Generator v2</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
font-family:Arial,sans-serif;
padding:20px;
}
.card{
max-width:560px;width:100%;
background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.15);
border-radius:20px;
padding:30px;
color:#fff;
box-shadow:0 20px 40px rgba(0,0,0,.35);
animation:fade .5s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.input-group-text{cursor:pointer}
.history{max-height:120px;overflow:auto;font-size:.9rem}
.badge{cursor:pointer}
</style>
</head>
<body>
<div class="card">
<h3 class="text-center mb-3"><i class="bi bi-shield-lock-fill"></i> Ultimate Password Generator</h3>

<label>Password Length: <span id="lenVal">16</span></label>
<input id="length" class="form-range mb-3" type="range" min="4" max="64" value="16">

<div class="form-check"><input class="form-check-input" id="u" type="checkbox" checked><label class="form-check-label">Uppercase</label></div>
<div class="form-check"><input class="form-check-input" id="l" type="checkbox" checked><label class="form-check-label">Lowercase</label></div>
<div class="form-check"><input class="form-check-input" id="n" type="checkbox" checked><label class="form-check-label">Numbers</label></div>
<div class="form-check"><input class="form-check-input" id="s" type="checkbox" checked><label class="form-check-label">Symbols</label></div>
<div class="form-check"><input class="form-check-input" id="r" type="checkbox"><label class="form-check-label">No Repeat</label></div>

<div class="mt-3 d-flex gap-2">
<button class="btn btn-primary flex-fill" id="gen"><i class="bi bi-lightning-charge"></i> Generate</button>
<button class="btn btn-warning" id="regen"><i class="bi bi-arrow-repeat"></i></button>
</div>

<div class="input-group my-3">
<input id="out" class="form-control" type="password" readonly>
<span class="input-group-text" id="eye"><i class="bi bi-eye-slash"></i></span>
<span class="input-group-text" id="copy"><i class="bi bi-clipboard"></i></span>
</div>

<div class="d-flex justify-content-between">
<span id="label">-</span><span id="entropy">0 bits</span>
</div>
<div class="progress mb-3"><div id="bar" class="progress-bar"></div></div>

<button class="btn btn-success w-100 mb-3" id="save"><i class="bi bi-download"></i> Save Password</button>

<h6>Recent Passwords</h6>
<div id="history" class="history border rounded p-2"></div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
<div class="toast" id="toast"><div class="toast-body">Password Copied!</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const U='ABCDEFGHIJKLMNOPQRSTUVWXYZ',L='abcdefghijklmnopqrstuvwxyz',N='0123456789',S='!@#$%^&*()_+-=[]{}|;:,.<>?/';
const ids=x=>document.getElementById(x);
const len=ids('length'),lenVal=ids('lenVal'),out=ids('out');
len.oninput=()=>{lenVal.textContent=len.value;generate();};
['u','l','n','s','r'].forEach(i=>ids(i).onchange=generate);
ids('gen').onclick=generate;
ids('regen').onclick=generate;
ids('eye').onclick=()=>{out.type=out.type==='password'?'text':'password';ids('eye').innerHTML='<i class="bi '+(out.type==='password'?'bi-eye-slash':'bi-eye')+'"></i>';};
ids('copy').onclick=async()=>{if(!out.value)return;await navigator.clipboard.writeText(out.value);bootstrap.Toast.getOrCreateInstance(ids('toast')).show();};
ids('save').onclick=()=>{if(!out.value)return;const b=new Blob([out.value],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Password_'+new Date().toISOString().replace(/[:.]/g,'-')+'.txt';a.click();};

function rand(max){const a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]%max;}
function pick(str){return str[rand(str.length)]}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=rand(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function generate(){
let pool='',g=[];
if(ids('u').checked){pool+=U;g.push(pick(U));}
if(ids('l').checked){pool+=L;g.push(pick(L));}
if(ids('n').checked){pool+=N;g.push(pick(N));}
if(ids('s').checked){pool+=S;g.push(pick(S));}
if(!pool){alert('Select at least one option');return;}
let need=+len.value-g.length,res=[];
while(res.length<need){
let c=pick(pool);
if(ids('r').checked&&(g.includes(c)||res.includes(c)))continue;
res.push(c);
}
let pass=shuffle([...g,...res]).join('');
out.value=pass;
let score=0;
if(pass.length>=8)score+=20;
if(pass.length>=12)score+=20;
if(/[A-Z]/.test(pass))score+=20;
if(/[a-z]/.test(pass))score+=15;
if(/[0-9]/.test(pass))score+=15;
if(/[^A-Za-z0-9]/.test(pass))score+=10;
ids('bar').style.width=score+'%';
ids('bar').className='progress-bar '+(score<40?'bg-danger':score<70?'bg-warning':'bg-success');
ids('label').textContent=score<40?'Weak':score<70?'Medium':'Strong';
ids('entropy').textContent=Math.round(pass.length*Math.log2(pool.length))+' bits';
let h=JSON.parse(localStorage.getItem('pwHistory')||'[]');
h.unshift(pass);h=[...new Set(h)].slice(0,5);
localStorage.setItem('pwHistory',JSON.stringify(h));
renderHistory();
}
function renderHistory(){
let h=JSON.parse(localStorage.getItem('pwHistory')||'[]');
ids('history').innerHTML=h.map(x=>'<div class="badge text-bg-dark w-100 text-start mb-1">'+x+'</div>').join('')||'No history';
}
renderHistory();generate();
</script>
</body>
</html>
